<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Application securisee</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 48px 16px;
        }

        .login-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 320px;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            text-align: left;
            margin: 14px 0 6px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 6px 0;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }

        button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            background: #2b5797;
            color: white;
            cursor: pointer;
            margin-top: 18px;
        }

        .error {
            color: red;
        }

        .logout {
            color: green;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Authentification</h2>

    <!-- Spring Security intercepts this POST request. -->
    <form th:action="@{/authenticate}" method="post">
        <label for="username">Nom d'utilisateur :</label>
        <input id="username" type="text" name="username" placeholder="Saisir le nom d'utilisateur" required>

        <label for="password">Mot de passe :</label>
        <input id="password" type="password" name="password" placeholder="Mot de passe" required>

        <button type="submit">Se connecter</button>
    </form>

    <p th:if="${param.error}" class="error">Identifiants incorrects, veuillez reessayer.</p>
    <p th:if="${param.logout}" class="logout">Vous etes deconnecte avec succes.</p>
</div>
</body>
</html>
