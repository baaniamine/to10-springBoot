<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f8fafc;
            color: #1f2937;
        }

        .page {
            max-width: 760px;
            margin: 56px auto;
            padding: 32px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        ul {
            line-height: 2;
        }
    </style>
</head>
<body>
<div class="page">
    <h2>Bienvenue dans l'application securisee</h2>
    <p>Connexion reussie ! Choisissez votre espace :</p>

    <!-- These links make the role-based flow easy to test. -->
    <ul>
        <li><a th:href="@{/user/dashboard}">Espace Utilisateur</a></li>
        <li><a th:href="@{/admin/dashboard}">Espace Administrateur</a></li>
    </ul>

    <a th:href="@{/logout}">Se deconnecter</a>
</div>
</body>
</html>
